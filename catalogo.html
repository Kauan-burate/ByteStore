     </a>

        <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarText">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">Home</a>

        </ul>
        
        </div>

    </nav>

    <div id="carouselExample" class="carousel slide">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="./assets/img/imagem 1.jpg" class="d-block w-100" alt="...">
    </div>
    <div class="carousel-item">
      <img src="./assets/img/imagem 2.png" class="d-block w-100" alt="...">
    </div>
    <div class="carousel-item">
      <img src="./assets/img/imagem 3.png" class="d-block w-100" alt="...">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>

<section class="container py-5">

    <h2 class="text-center mb-4">Catálogo de Produtos</h2>

    <!-- Busca e filtro -->
    <div class="row mb-4">
        <div class="col-md-8">
            <input
                type="text"
                id="busca"
                class="form-control"
                placeholder="Buscar produto..."
            >
        </div>

        <div class="col-md-4">
            <select id="filtroCategoria" class="form-select">
                <option value="todos">Todas Categorias</option>
                <option value="notebook">Notebooks</option>
                <option value="hardware">Hardware</option>
                <option value="monitor">Monitores</option>
                <option value="periferico">Periféricos</option>
            </select>
        </div>
    </div>

    <p class="fw-bold">
        Exibindo <span id="contador">1</span> produtos
    </p>

    <!-- Grid -->
    <div class="row g-4" id="catalogo">

        <!-- Card -->
        <div class="col-md-4">
            <div class="card h-100 shadow">
                <img src="./assets/img/rtx 4060.webp" class="card-img-top">

                <div class="card-body">

                    <h5 class="card-title">
                        RTX 4060
                    </h5>

                    <p class="text-primary">
                        Hardware
                    </p>

                    <p class="card-text">
                        Placa de vídeo 8GB GDDR6 para jogos e edição.
                    </p>

                    <span class="badge bg-success">
                        Disponível
                    </span>

                </div>
            </div>
        </div>

    </div>

</section>

</html>
